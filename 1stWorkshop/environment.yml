name: 1stWorkshop
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pytorch
  - pytorch-cuda=11.8      # matches Anvil's CUDA; avoids pip NCCL conflicts
  - pip
  - pip:
      - transformers>=4.40.0
      - datasets>=2.14.0
      - accelerate>=1.13.0
      - peft>=0.19.1
      - bitsandbytes>=0.41.0
      - safetensors>=0.3.0
      - tokenizers
      - matplotlib
      - jupyterlab
      - ipywidgets
      - notebook
      - ipykernel
